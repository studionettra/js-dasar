  <body>
    <form action="" method="post" onsubmit="return false;">
      <label for="">Masukan Nama Kota</label>
      <input type="text" id="kota" />
      <button onclick="jasaPengiriman()">Tes</button>
    </form>

    <p id="hasil"></p>

    <script>
      function jasaPengiriman() {
        let kota = document.querySelector("#kota").value;
        let berat = 10;
        let tarif = 0;

        if (kota === "Bogor") {
          tarif = 2000;
        } else if (kota === "Depok") {
          tarif = 4000;
        } else {
          tarif = 6000;
        }

        const total = `Total = ${berat * tarif}`;
        document.querySelector("#hasil").innerHTML = total;
      }
