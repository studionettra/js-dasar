      <select name="" id="operator" required>
        <option value="">Pilih</option>
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
        </select><br>
      <label for="">Nilai 2</label>
      <input type="number" id="nilai2"><br>
      <button onclick="perhitungan()">Hitung</button>
    </form>

    <!-- <h4 id="hasil"></h4> -->

    <input type="text" id="hasil">   

    <script>
      function perhitungan() {
        let nilai1 = parseFloat(document.getElementById("nilai1").value);
        let nilai2 = parseFloat(document.getElementById("nilai2").value);
        let operator = document.getElementById("operator").value;
        let hasil = 0;

        switch (operator) {
          case "+":
            hasil = nilai1 + nilai2;
            break;
          case "-":
            hasil = nilai1 - nilai2;
            break;
          case "*":
            hasil = nilai1 * nilai2;
            break;
            case "/":
            hasil = nilai1 / nilai2;
            break;
            default:
            hasil = "Tidak Ada!"
            break;
        }
        document.getElementById("hasil").value = hasil;
      }
